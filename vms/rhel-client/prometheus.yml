global:
  scrape_interval: 60s
  evaluation_interval: 60s

scrape_configs:
  - job_name: "rhel-client"
    static_configs:
      - targets: ['localhost:9100']

  - job_name: 'opnsense_firewall'
    scrape_interval: 30s
    metric_path: /metrics
    static_configs:
      - targets: ['192.168.2.2:9100']
        labels:
          instance: 'opnsense-fw'
          environment: 'production'
          role: 'firewall'
